            <div class="form-item" id="form-holder">

                    <label for="item-1" aria-label="Hello">To-do Item 1</label>
                    <input type="text" name="item-1" id="item-1" />
                    <a id="item-remover-1">x</a>
                    <p class="error">
                        Enter valid to-do item
                    </p>
                </div>
            </div>
            <div class="form-item-button">
                <button type="submit" id="add-new">
                    Add new
                </button>
                <button
                        type="submit"
                        id="submit"
                >
                    Create

            </div>
        </div>
    </form>
